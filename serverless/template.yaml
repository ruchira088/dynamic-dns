AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: dynamic-dns-serverless-api

Parameters:
  DomainName:
    Type: String
    Default: ip.ruchij.com
    Description: Custom domain name for the API
  HostedZoneId:
    Type: String
    Default: Z1LYXU4HVSANEL
    Description: Route53 Hosted Zone ID for ruchij.com

Globals:
  Function:
    Runtime: java25
    Timeout: 25
    MemorySize: 512

Resources:
  ServerlessApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: production
      EndpointConfiguration:
        Type: REGIONAL

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dynamic-dns-serverless-api-production-healthCheck
      Handler: com.ruchij.serverless.handlers.ApiGatewayRequestHandler
      Description: Health check endpoint
      CodeUri: target/scala-2.13/dynamic-dns-serverless-api.jar
      Events:
        HealthCheckGet:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessApi
            Path: /health
            Method: get

  IpAddressFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dynamic-dns-serverless-api-production-ipAddress
      Handler: com.ruchij.serverless.handlers.ApiGatewayRequestHandler
      Description: Responds with the IP address of the request
      CodeUri: target/scala-2.13/dynamic-dns-serverless-api.jar
      Events:
        IpAddressGet:
          Type: Api
          Properties:
            RestApiId: !Ref ServerlessApi
            Path: /
            Method: get

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  ApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref Certificate
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - ServerlessApiproductionStage
    Properties:
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref ServerlessApi
      Stage: production

  Route53RecordSet:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - Name: !Ref DomainName
          Type: A
          AliasTarget:
            DNSName: !GetAtt ApiDomainName.RegionalDomainName
            HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId
        - Name: !Ref DomainName
          Type: AAAA
          AliasTarget:
            DNSName: !GetAtt ApiDomainName.RegionalDomainName
            HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

Outputs:
  DomainUrl:
    Description: Domain URL
    Value: !Sub "https://${DomainName}/"
